services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: like-meeting-assistant-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./backend/app/recordings:/app/app/recordings
      - ./backend/app/storage:/app/app/storage
      # Whisper 모델 캐시 유지 (재빌드/재생성 시 3GB 재다운로드 방지)
      - whisper-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: like-meeting-assistant-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  whisper-cache:
